<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .texto{
            color:red;
        }
        .campo{
            border:1px solid pink;
        }
        .botao{
            background-color:blue;
            color:white;
        }
        fieldset{
            border:1px solid green;
        }
    </style>
</head>
<body>
  <form>
      <fieldset>
           <p class="texto"</p>CPF: <input type="text" class="campo" placeholder="digite seu cpf" maxlength="11" minlength="11" required><br><br>
    <p class="texto"</p> EMAIL: <input type="text" class="campo" placeholder="digite seu email" maxlength="30" minlength="11" required><br><br>
     <p class="texto"</p>NOME: <input type="text" class="campo" placeholder="digite seu nome" maxlength="50" minlength="11" required><br><br>
     <p class="texto"</p>SENHA: <input type="text" class="campo" placeholder="digite seu senha" maxlength="10" minlength="5" required><br><br>
     <p class="texto"</p>TELEFONE: <input type="text" class="campo" placeholder="digite seu telefone" maxlength="11" minlength="11" required><br><br>
    <input type="submit" value="cadastrar" class="botao">
      </fieldset>
   
  </form>
    
</body>
</html>
